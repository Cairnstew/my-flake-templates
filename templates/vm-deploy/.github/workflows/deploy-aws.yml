# .github/workflows/deploy-aws.yml
name: Build and Deploy NixOS Amazon Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: ccws-coursework-one
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Build Amazon image
        run: |
          nix build .#amazon-image --print-build-logs
          echo "IMAGE_PATH=$(readlink -f result/*.vhd)" >> $GITHUB_ENV
          echo "IMAGE_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Tofu init
        working-directory: terraform/deployments/aws
        run: tofu init

      - name: Tofu apply
        working-directory: terraform/deployments/aws
        run: |
          tofu apply -auto-approve \
            -var="bucket=${{ secrets.AWS_BUCKET }}" \
            -var="region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -var="image_path=${{ env.IMAGE_PATH }}" \
            -var="image_hash=${{ env.IMAGE_HASH }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="vm_name=${{ vars.VM_NAME || 'myvm' }}"