# .github/workflows/deploy-gcp.yml
name: Build and Deploy NixOS GCE Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: ccws-coursework-one
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Build GCE image
        run: |
          nix build .#gce-image --print-build-logs
          echo "IMAGE_PATH=$(readlink -f result/*.tar.gz)" >> $GITHUB_ENV
          echo "IMAGE_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Tofu init
        working-directory: terraform/deployments/gcp
        run: tofu init

      - name: Tofu apply
        working-directory: terraform/deployments/gcp
        run: |
          tofu apply -auto-approve \
            -var="project=${{ secrets.GCP_PROJECT }}" \
            -var="bucket=${{ secrets.GCP_BUCKET }}" \
            -var="image_path=${{ env.IMAGE_PATH }}" \
            -var="image_hash=${{ env.IMAGE_HASH }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="vm_name=${{ vars.VM_NAME || 'myvm' }}"